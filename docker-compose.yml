services:
  db:
    image: mysql:8.0
    container_name: redsteel-db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      TZ: America/Argentina/Buenos_Aires
      MYSQL_DATABASE: ${MYSQL_DATABASE:-redsteel}
      MYSQL_USER: ${MYSQL_USER:-redsteel_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - redsteel_db:/var/lib/mysql
    networks:
      - redsteel
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          memory: 512M

  wordpress:
    image: wordpress:6.7
    container_name: redsteel-wp
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 15s
      timeout: 5s
      retries: 3
    environment:
      TZ: America/Argentina/Buenos_Aires
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST:-redsteel-db:3306}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-redsteel_user}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-redsteel}
      WP_HOME: ${WP_HOME:-https://redsteel.com.ar}
      WP_SITEURL: ${WP_SITEURL:-https://redsteel.com.ar}

      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG', false);
        define('WP_DEBUG_LOG', false);
        define('WP_DEBUG_DISPLAY', false);
        define('FORCE_SSL_ADMIN', true);

        if (!empty($$_SERVER['HTTP_X_FORWARDED_PROTO']) && $$_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
          $$_SERVER['HTTPS'] = 'on';
        }

    ports:
      - "127.0.0.1:8088:80"
    volumes:
      - redsteel_wp:/var/www/html
    networks:
      - redsteel
      - proxy_default
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 256M

volumes:
  redsteel_db:
  redsteel_wp:

networks:
  redsteel:
    name: redsteel_default
  proxy_default:
    external: true
    name: proxy_default
